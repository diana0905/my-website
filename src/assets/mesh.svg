<svg class="meshSvg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <filter id="noise">
      <feTurbulence id="turb" type="fractalNoise" baseFrequency="0.01" numOctaves="2" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="12"/>
    </filter>

    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff50c8"/>
      <stop offset="45%" stop-color="#50c8ff"/>
      <stop offset="100%" stop-color="#78ffa0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="100" height="100" fill="url(#grad)" filter="url(#noise)"></rect>
</svg>